stages:
  - test
  - build

unit-test:
  stage: test
  image: python:3.11-slim
  script:
    - python -m pip install -e .
    - export PYTHONPATH=src
    - python -m unittest discover -s tests -v

docker-build:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  script:
    - docker build -t specgate:ci .
    - docker run --rm specgate:ci specgate-web --help
  rules:
    - if: $CI_COMMIT_BRANCH
