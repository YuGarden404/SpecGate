<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SpecGate</title>
  <link rel="stylesheet" href="/styles.css?v=20260712-2">
</head>
<body>
  <main id="auth-view" class="auth-view" hidden>
    <section class="auth-card" aria-labelledby="auth-title">
      <p class="eyebrow">SpecGate</p>
      <h1 id="auth-title">Sign in to your workspace</h1>
      <form id="auth-form" class="stack">
        <label>
          Username
          <input id="auth-username" name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="8" required>
        </label>
        <div class="button-row">
          <button type="submit">Log in</button>
          <button id="register-button" type="button" class="secondary">Register</button>
        </div>
      </form>
      <p id="auth-message" class="message-line" role="status"></p>
    </section>
  </main>

  <main id="workspace-view" class="workspace-view" hidden>
    <aside class="sidebar" aria-label="Projects and settings">
      <header class="sidebar-header">
        <div>
          <p class="eyebrow">SpecGate</p>
          <strong id="current-user">Workspace</strong>
        </div>
        <button id="logout-button" type="button" class="icon-button" title="Log out">Exit</button>
      </header>

      <div class="sidebar-actions">
        <button id="new-project-button" type="button">New project</button>
        <button id="refresh-button" type="button" class="secondary">Refresh</button>
      </div>

      <nav id="project-list" class="project-list" aria-label="Project list"></nav>

      <section id="settings-detail" class="settings-detail" aria-labelledby="settings-title">
        <div class="section-title">
          <h2 id="settings-title">Settings</h2>
          <span id="settings-api-state" class="pill">API key: unknown</span>
        </div>
        <form id="settings-form" class="stack">
          <label>
            Governance
            <select id="governance-profile" name="governance_profile">
              <option value="strict">strict</option>
              <option value="demo">demo</option>
              <option value="review">review</option>
            </select>
          </label>
          <label>
            Context
            <select id="context-strategy" name="context_strategy">
              <option value="baseline">baseline</option>
              <option value="compressed">compressed</option>
              <option value="injection-safe">injection-safe</option>
              <option value="rag-select">rag-select</option>
              <option value="compressed-rag">compressed-rag</option>
              <option value="isolated-harness">isolated-harness</option>
            </select>
          </label>
          <button type="submit" class="secondary">Save settings</button>
        </form>
        <form id="api-key-form" class="stack compact-stack">
          <label>
            API key
            <input id="api-key-input" name="api_key" type="password" autocomplete="off" placeholder="Paste key">
          </label>
          <div class="button-row">
            <button type="submit" class="secondary">Store</button>
            <button id="clear-api-key-button" type="button" class="ghost">Clear</button>
          </div>
        </form>
      </section>
    </aside>

    <section class="conversation" aria-label="Conversation">
      <header class="conversation-header">
        <div>
          <p class="eyebrow">Project</p>
          <h1 id="project-title">Select a project</h1>
        </div>
        <span id="run-status-pill" class="pill">Idle</span>
      </header>

      <ol id="message-list" class="message-list" aria-live="polite"></ol>

      <form id="run-form" class="composer">
        <label class="sr-only" for="run-prompt">Run prompt</label>
        <textarea id="run-prompt" name="prompt" rows="3" placeholder="Describe the change SpecGate should make..." required></textarea>
        <button type="submit">Start run</button>
      </form>
      <p id="app-message" class="message-line" role="status"></p>
    </section>

    <aside id="detail-panel" class="detail-panel" aria-label="Run details">
      <div class="detail-tabs" role="tablist" aria-label="Detail tabs">
        <button type="button" class="tab-button active" data-tab="status">Status</button>
        <button type="button" class="tab-button" data-tab="preview">Preview</button>
        <button type="button" class="tab-button" data-tab="report">Report</button>
        <button type="button" class="tab-button" data-tab="approvals">Approvals</button>
        <button type="button" class="tab-button" data-tab="settings">Settings</button>
      </div>
      <section id="detail-content" class="detail-content" aria-live="polite"></section>
    </aside>
  </main>

  <dialog id="project-dialog">
    <form id="project-form" method="dialog" class="project-form">
      <header class="dialog-header">
        <h2>Create manual project</h2>
        <button id="close-project-dialog" type="button" class="icon-button" title="Close">Close</button>
      </header>
      <label>
        Name
        <input id="project-name" name="name" required>
      </label>
      <label>
        Task spec
        <textarea id="project-spec" name="spec_text" rows="8" required></textarea>
      </label>
      <label>
        Checklist
        <textarea id="project-checklist" name="checklist_text" rows="6" required></textarea>
      </label>
      <label>
        Starting index.html
        <textarea id="project-index" name="index_html" rows="6" placeholder="Optional"></textarea>
      </label>
      <div class="button-row align-end">
        <button type="button" id="cancel-project-button" class="secondary">Cancel</button>
        <button type="submit">Create project</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js?v=20260712-2" defer></script>
</body>
</html>
